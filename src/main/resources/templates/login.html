<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartRequests | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(20, 38, 70, 0.75), rgba(20, 38, 70, 0.75)),
        linear-gradient(135deg, #4e73df, #1cc88a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-card {
      border: none;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
    }

    .login-header {
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      color: white;
      padding: 35px 25px;
      text-align: center;
    }

    .login-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 32px;
    }

    .login-title {
      font-weight: 700;
      font-size: 1.35rem;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-bottom: 0;
    }

    .card-body {
      padding: 32px;
      background-color: #ffffff;
    }

    .form-label {
      font-weight: 600;
      color: #344767;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #d9dee8;
    }

    .form-control:focus {
      border-color: #4e73df;
      box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.15);
    }

    .btn-login {
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
    }

    .btn-login:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .captcha-box {
      background: #f8f9fc;
      border: 1px solid #d9dee8;
      border-radius: 10px;
      padding: 14px;
    }

    .captcha-check {
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .captcha-brand {
      font-size: 0.7rem;
      color: #6c757d;
      min-width: 80px;
    }

    .captcha-brand i {
      font-size: 24px;
      color: #4e73df;
    }

    .captcha-title {
      font-weight: 700;
      font-size: 0.72rem;
    }

    .policy-box {
      background: #f8f9fc;
      border: 1px solid #d9dee8;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.9rem;
    }

    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    @media (max-width: 768px) {
    body {
        min-height: 100vh;
        display: flex;
        align-items: flex-start !important;
        justify-content: center;
        padding-top: 35px;
        padding-left: 14px;
        padding-right: 14px;
    }

    .login-card,
    .card,
    .auth-card {
        width: 100% !important;
        max-width: 380px !important;
        margin: 0 auto !important;
    }

    .card-body {
        padding: 1.2rem !important;
    }

    input,
    .form-control {
        font-size: 16px !important;
    }
}
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">

      <div class="card login-card">

        <div class="login-header">
          <div class="login-icon">
            <i class="bi bi-journal-check"></i>
          </div>
          <h3 class="login-title">Sistema de Gestión de Solicitudes Académicas</h3>
          <p class="login-subtitle">Acceso seguro al sistema</p>
        </div>

        <div class="card-body">

          <form action="/login" method="post" autocomplete="off">

            <div class="alert alert-success" th:if="${param.registroExitoso != null and param.logout == null}">
              Cuenta creada correctamente para el usuario:
              <strong th:text="${param.registroExitoso}"></strong>.
              Ya puedes iniciar sesión.
            </div>

            <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <i class="bi bi-person"></i>
                </span>
                <input type="text"
                       name="username"
                       id="username"
                       class="form-control"
                       placeholder="Ingrese su usuario"
                       autocomplete="off"
                       required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <i class="bi bi-lock"></i>
                </span>
                <input type="password"
                       name="password"
                       id="password"
                       class="form-control"
                       placeholder="Ingrese su contraseña"
                       autocomplete="new-password"
                       required>
              </div>
            </div>

            <div class="captcha-box mb-3">
              <div class="d-flex align-items-center justify-content-between">
                <div class="form-check d-flex align-items-center gap-2">
                  <input class="form-check-input captcha-check"
                         type="checkbox"
                         id="noRobot"
                         name="noRobot"
                         value="on"
                         required>

                  <label class="form-check-label fw-semibold" for="noRobot">
                    No soy un robot
                  </label>
                </div>

                <div class="captcha-brand text-center">
                  <i class="bi bi-shield-check"></i>
                  <div class="captcha-title">SmartCaptcha</div>
                  <small>Seguridad</small>
                </div>
              </div>
            </div>

            <div class="policy-box mb-3">
              <div class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       id="aceptaPoliticaLogin"
                       required>

                <label class="form-check-label" for="aceptaPoliticaLogin">
                  He leído y acepto la
                  <a href="/politica-datos" target="_blank">
                    Política de Tratamiento de Datos Personales
                  </a>.
                </label>
              </div>
            </div>

            <button type="submit"
                    id="btnLogin"
                    class="btn btn-login text-white w-100 mt-2"
                    disabled>
              <i class="bi bi-box-arrow-in-right me-1"></i>
              Ingresar
            </button>

            <a href="/registro" class="btn btn-outline-primary w-100 mt-2">
              Crear cuenta nueva
            </a>

            <div class="alert alert-info mt-3" th:if="${param.logout}">
              Sesión cerrada correctamente.
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const noRobot = document.getElementById("noRobot");
  const btnLogin = document.getElementById("btnLogin");
  const politica = document.getElementById("aceptaPoliticaLogin");

  function validarIngreso() {
      btnLogin.disabled = !(noRobot.checked && politica.checked);
  }

  noRobot.addEventListener("change", validarIngreso);
  politica.addEventListener("change", validarIngreso);

  window.addEventListener("pageshow", function (event) {
      if (event.persisted) {
          window.location.reload();
      }
  });
</script>

</body>
</html>
