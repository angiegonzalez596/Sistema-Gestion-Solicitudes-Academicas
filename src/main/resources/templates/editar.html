<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartRequests | Editar Solicitud</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        .topbar {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            padding: 22px 0;
            color: white;
            box-shadow: 0 8px 24px rgba(78, 115, 223, 0.25);
        }

        .card-custom {
            border: none;
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .08);
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 11px 14px;
            border: 1px solid #d9dee8;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #4e73df;
            box-shadow: 0 0 0 .2rem rgba(78, 115, 223, .15);
        }

        .form-label {
            font-weight: 600;
            color: #344767;
        }

        .section-title {
            font-weight: 700;
            color: #344767;
        }

        .text-soft {
            color: #6c757d;
        }

        .btn-main {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
            color: white;
        }

        .btn-main:hover {
            opacity: .95;
            color: white;
            transform: translateY(-1px);
        }

        .btn-cancel {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }

        .form-icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .info-box {
            background: #f8f9fc;
            border-radius: 14px;
            padding: 12px 15px;
            font-size: .9rem;
            color: #6c757d;
            border: 1px solid #eef1f6;
        }
    </style>
</head>

<body>

<nav class="topbar mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-0 fw-bold">
                <i class="bi bi-pencil-square me-2"></i>
                Editar Solicitud Académica
            </h4>
            <small>Actualiza la información y el estado de la solicitud</small>
        </div>

        <a href="/" class="btn btn-light fw-semibold rounded-3">
            <i class="bi bi-arrow-left me-1"></i>
            Volver
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card card-custom">
                <div class="card-body p-4 p-md-5">

                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="form-icon">
                            <i class="bi bi-journal-text"></i>
                        </div>

                        <div>
                            <h4 class="section-title mb-1">Editar solicitud</h4>
                            <p class="text-soft mb-0">
                                Modifica los datos necesarios y guarda los cambios realizados.
                            </p>
                        </div>
                    </div>

                    <div class="info-box mb-4">
                        <i class="bi bi-info-circle me-1"></i>
                        Estás editando la solicitud registrada en el sistema.
                    </div>

                    <form th:action="@{/actualizar}" th:object="${solicitud}" method="post">

                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{fechaCreacion}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre del estudiante</label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                       id="nombre" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" th:field="*{correo}" class="form-control"
                                       id="correo" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Tipo de solicitud</label>
                                <select th:field="*{tipo}" class="form-select" id="tipo" required>
                                    <option value="Certificado">Certificado</option>
                                    <option value="Homologación">Homologación</option>
                                    <option value="Cambio de grupo">Cambio de grupo</option>
                                    <option value="Revisión de nota">Revisión de nota</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Prioridad</label>
                                <select th:field="*{prioridad}" class="form-select" id="prioridad">
                                    <option value="Baja">Baja</option>
                                    <option value="Media">Media</option>
                                    <option value="Alta">Alta</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Estado</label>
                                <select th:field="*{estado}" class="form-select" id="estado">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="En revisión">En revisión</option>
                                    <option value="Aprobada">Aprobada</option>
                                    <option value="Rechazada">Rechazada</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control"
                                      id="descripcion" rows="5"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="/" class="btn btn-outline-secondary btn-cancel">
                                <i class="bi bi-x-circle me-1"></i>
                                Cancelar
                            </a>

                            <button type="submit" class="btn btn-main" id="btnActualizar">
                                <i class="bi bi-check-circle me-1"></i>
                                Actualizar solicitud
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
<script>
    window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
</script>
</body>
</html>
